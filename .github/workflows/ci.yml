name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Cache modules
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - run: go vet ./...
      - run: go test ./... -race -timeout 5m
      - run: go build -o salience .

  cross-compile:
    name: cross-compile · ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { os: darwin,  arch: arm64 }
          - { os: darwin,  arch: amd64 }
          - { os: linux,   arch: amd64 }
          - { os: linux,   arch: arm64 }
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
      - run: GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o /tmp/salience-${{ matrix.os }}-${{ matrix.arch }} .
